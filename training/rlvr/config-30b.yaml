# RLVR Training Configuration — Qwen3-30B-A3B
# Phase 4b: GRPO on the 30B SFT checkpoint

# Model
model: Qwen3-30B-A3B-Base
sft_checkpoint: tinker://6d56c642-fed2-539d-853b-8311cc4939ed:train:0/weights/checkpoint-step-600

training_tasks: data/sft/train_task_ids.json  # 447 training tasks
heldout_tasks: data/sft/heldout_task_ids.json  # 111 held-out tasks

# Rollout Configuration
rollouts:
  rollouts_per_task: 8   # K completions per task (GRPO group size)
  num_iterations: 10     # Total RLVR iterations
  tasks_per_batch: 30    # Tasks sampled per iteration
  temperature: 0.7       # Sampling temperature for rollouts
  max_tokens: 512        # Max tokens per completion
  refresh_sampler_every_iteration: true

# Training hyperparameters
training:
  learning_rate: 5.0e-6  # Same as 8B run
  weight_decay: 0.01
  grad_clip_norm: 1.0
  reward_mode: shaped
  reward_weights:
    syntax: 0.1
    kondo: 0.2
    load: 0.1
    tests: 0.6

  # GRPO-specific
  kl_penalty_coeff: 0.1
  clip_range: 0.2

# Checkpointing
checkpointing:
  save_steps: 2
  output_dir: checkpoints/rlvr-30b

# Logging
logging:
  wandb_project: clojure-llm
  wandb_entity: nibzard-org
