# RLVR Training Configuration
# GRPO (Group Relative Policy Optimization) with Clojure verifier rewards

# Model
model: Qwen3-8B-Base
sft_checkpoint: tinker://b5c7e66e-618a-5f71-919e-da1db6844679:train:0/weights/checkpoint-step-600

training_tasks: data/sft/train_task_ids.json  # 447 training tasks
heldout_tasks: data/sft/heldout_task_ids.json  # 111 held-out tasks

# Rollout Configuration
rollouts:
  rollouts_per_task: 8   # K completions per task (GRPO group size)
  num_iterations: 10     # Total RLVR iterations
  tasks_per_batch: 30    # Tasks sampled per iteration
  temperature: 0.7       # Sampling temperature for rollouts
  max_tokens: 512        # Max tokens per completion

# Training hyperparameters
training:
  learning_rate: 5.0e-6  # Lower than SFT (was 2e-5)
  weight_decay: 0.01
  grad_clip_norm: 1.0

  # GRPO-specific
  kl_penalty_coeff: 0.1
  clip_range: 0.2

# Checkpointing
checkpointing:
  save_steps: 2          # Save every 2 iterations
  output_dir: checkpoints/rlvr

# Logging
logging:
  wandb_project: clojure-llm
  wandb_entity: nibzard-org
