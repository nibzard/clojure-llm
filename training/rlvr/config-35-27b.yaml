# RLVR Training Configuration
# GRPO with shaped verifier rewards on SFT Qwen3.5-27B

# Model
model: Qwen3.5-27B
sft_checkpoint: tinker://f40fe0d6-03b2-5a2d-84b3-8c52569e411c:train:0/weights/checkpoint-step-1300

training_tasks: data/sft/train_task_ids.json
heldout_tasks: data/sft/heldout_task_ids.json

# Rollout Configuration
rollouts:
  rollouts_per_task: 8
  num_iterations: 10
  tasks_per_batch: 30
  temperature: 0.7
  max_tokens: 512
  refresh_sampler_every_iteration: true

# Training hyperparameters
training:
  learning_rate: 5.0e-6
  weight_decay: 0.01
  grad_clip_norm: 1.0
  reward_mode: shaped
  reward_weights:
    syntax: 0.1
    kondo: 0.2
    load: 0.1
    tests: 0.6

  kl_penalty_coeff: 0.1
  clip_range: 0.2

# Checkpointing
checkpointing:
  save_steps: 2
  output_dir: checkpoints/rlvr-35-27b

# Logging
logging:
  wandb_project: clojure-llm
  wandb_entity: nibzard-org
