# SFT Training Configuration for Tinker
# Supervised Fine-Tuning of Qwen3-8B-Base on Clojure data

# Model Configuration
model: Qwen3-8B-Base
model_type: base  # Base model, not instruct-tuned

# LoRA Configuration
lora:
  rank: 32           # LoRA rank
  alpha: 64          # LoRA alpha (typically 2x rank)
  target_modules:    # Apply LoRA to all layers
    - mlp
    - attention
  dropout: 0.1

# Training Configuration
training:
  learning_rate: 2.0e-5
  num_epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 1
  max_seq_length: 2048

  # Optimizer settings
  optimizer: adamw
  weight_decay: 0.01
  warmup_ratio: 0.1

  # LR scheduling
  lr_scheduler: cosine
  min_lr_ratio: 0.1

# Data Configuration
data:
  train_path: data/sft/train.jsonl
  val_path: data/sft/val.jsonl
  format: chat  # Tinker ChatDatasetBuilder format

  # Preprocessing
  shuffle: true
  seed: 42

# Checkpointing
checkpointing:
  save_steps: 100
  save_total_limit: 3
  output_dir: checkpoints/sft

# Logging
logging:
  log_steps: 10
  wandb_project: clojure-llm
  wandb_entity: null  # Set to your wandb username

# Evaluation
evaluation:
  eval_steps: 100
  eval_samples: 100  # Number of samples to generate for evaluation
  benchmark_tasks: benchmark/tasks-v0.edn
