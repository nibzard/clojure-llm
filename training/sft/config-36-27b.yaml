# SFT Training Configuration for Tinker
# Supervised Fine-Tuning of Qwen3.6-27B on Clojure data

# Model Configuration
model: Qwen3.6-27B
model_type: base  # Dense 27B model

# LoRA Configuration
lora:
  rank: 32
  alpha: 64
  target_modules:
    - mlp
    - attention
  dropout: 0.1

# Training Configuration
training:
  learning_rate: 2.0e-5
  num_epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 1
  max_seq_length: 2048

  optimizer: adamw
  weight_decay: 0.01
  warmup_ratio: 0.1

  lr_scheduler: cosine
  min_lr_ratio: 0.1

# Data Configuration
data:
  train_path: data/sft/sft_train.jsonl
  val_path: data/sft/sft_val.jsonl
  format: chat
  shuffle: true
  seed: 42

# Checkpointing
checkpointing:
  save_steps: 100
  save_total_limit: 3
  output_dir: checkpoints/sft-36-27b

# Logging
logging:
  log_steps: 10
  wandb_project: clojure-llm
  wandb_entity: nibzard-org

# Evaluation
evaluation:
  eval_steps: 100
  eval_samples: 100
  benchmark_tasks: benchmark/tasks-v0.edn
